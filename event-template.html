<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    ╔═══════════════════════════════════════════════════════════════╗
    ║              RONNCHERIE — EVENT PAGE TEMPLATE                 ║
    ║                                                               ║
    ║  USAGE: Duplicate this file for each special event.           ║
    ║  Example: copy to "wedding-karin-2025.html"                   ║
    ║                                                               ║
    ║  Then edit the three config variables below:                  ║
    ║    EVENT_TITLE   → shown in the page heading                  ║
    ║    EVENT_DESC    → a short sentence about the occasion         ║
    ║    EVENT_ITEMS   → array of item IDs from catalog.js to show  ║
    ║                                                               ║
    ║  The page automatically pulls all details (name, price, etc.) ║
    ║  from catalog.js — no duplication needed.                     ║
    ╚═══════════════════════════════════════════════════════════════╝
  -->
  <title>Ronncherie – Special Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:   #faf6f0;
      --warm:    #f2e8d9;
      --gold:    #c8963e;
      --gold-lt: #e8c07a;
      --brown:   #3d2b1f;
      --mink:    #7a5c48;
      --text:    #2e1f14;
      --dust:    #ede4d8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text);
    }
    .event-header {
      background: var(--brown);
      color: #fff;
      text-align: center;
      padding: 5rem 2rem 4rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--gold-lt);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .back-link:hover { color: #fff; }
    .event-label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold-lt);
      margin-bottom: 0.75rem;
    }
    .event-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 300;
      color: #fff;
      font-style: italic;
      margin-bottom: 1rem;
    }
    .event-desc {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      color: rgba(255,255,255,0.6);
      font-style: italic;
      max-width: 500px;
      margin: 0 auto;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 1.5rem auto;
    }

    .event-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }
    .card {
      background: var(--cream);
      border: 1px solid rgba(200, 150, 62, 0.15);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: fadeUp 0.5s ease both;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(61, 43, 31, 0.12);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, var(--dust) 0%, var(--warm) 100%);
      display: grid;
      place-items: center;
      color: var(--gold-lt);
      font-size: 3rem;
    }
    .card-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
    .card-tag {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: var(--brown);
      margin-bottom: 0.5rem;
    }
    .card-desc {
      font-size: 0.88rem;
      color: var(--mink);
      line-height: 1.7;
      flex: 1;
      margin-bottom: 1.2rem;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--dust);
      padding-top: 1rem;
    }
    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      color: var(--gold);
    }
    .card-price span {
      font-size: 0.75rem;
      font-family: 'Jost', sans-serif;
      color: var(--mink);
    }
    .card-wa {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--gold-lt);
      color: var(--gold);
      padding: 0.4rem 0.9rem;
      border-radius: 2px;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .card-wa:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
    footer {
      background: var(--brown);
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
    }
    footer strong {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      color: var(--gold-lt);
      margin-bottom: 0.3rem;
    }
    @media (max-width: 600px) {
      .catalog-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="event-header">
    <a class="back-link" href="index.html">
      ← Back to full catalog
    </a>
    <p class="event-label" id="eventLabel">Special Selection</p>
    <h1 class="event-title" id="eventTitle">Loading…</h1>
    <div class="divider"></div>
    <p class="event-desc" id="eventDesc"></p>
  </header>

  <main class="event-body">
    <div class="catalog-grid" id="eventGrid"></div>
  </main>

  <footer>
    <strong>Ronncherie</strong>
    Handmade with love
  </footer>

  <script src="catalog.js"></script>
  <script>
    /* ═══════════════════════════════════════════════════
       EDIT THESE THREE LINES FOR EACH EVENT PAGE
    ═══════════════════════════════════════════════════ */
    const EVENT_TITLE = "Summer Garden Party";           // ← page heading
    const EVENT_DESC  = "A curated selection for your outdoor celebration."; // ← subtitle
    const EVENT_ITEMS = [                                // ← IDs from catalog.js
      "chocolate-crunch-cake",
      "fruit-tart",
      "meringue-kisses",
      "brownie-tray",
    ];
    /* ═══════════════════════════════════════════════════ */

    const WA_NUMBER = "PHONENUMBER";
    const WA_BASE   = `https://wa.me/${WA_NUMBER}`;

    document.getElementById("eventTitle").textContent = EVENT_TITLE;
    document.getElementById("eventDesc").textContent  = EVENT_DESC;
    document.title = `Ronncherie – ${EVENT_TITLE}`;

    const items = EVENT_ITEMS
      .map(id => CATALOG.find(i => i.id === id))
      .filter(Boolean);

    document.getElementById("eventGrid").innerHTML = items.map((item, idx) => `
      <article class="card" style="animation-delay:${idx * 0.07}s">
        ${item.image
          ? `<img class="card-img" src="${item.image}" alt="${item.name}" loading="lazy" />`
          : `<div class="card-img-placeholder">🍰</div>`
        }
        <div class="card-body">
          <p class="card-tag">${item.tags[0] || ''}</p>
          <h3 class="card-name">${item.name}</h3>
          <p class="card-desc">${item.description}</p>
          <div class="card-footer">
            <div class="card-price">
              €${item.priceFrom}${item.priceTo ? `<span> – €${item.priceTo}</span>` : ''}
            </div>
            <a class="card-wa"
               href="${WA_BASE}?text=${encodeURIComponent('Hi! I\'m interested in: ' + item.name)}"
               target="_blank" rel="noopener">
              Order
            </a>
          </div>
        </div>
      </article>
    `).join('');
  </script>

</body>
</html>
